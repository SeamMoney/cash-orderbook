commands:
  install: pnpm install
  typecheck: pnpm -r typecheck
  build: pnpm -r build
  test: pnpm -r test
  lint: pnpm -r lint
  web-build: cd web && pnpm build
  web-dev: cd web && PORT=3103 pnpm dev

services:
  api:
    start: APTOS_NETWORK=testnet node api/dist/index.js &
    stop: lsof -ti :3100 | xargs kill 2>/dev/null || true
    healthcheck: "lsof -iTCP:3100 -sTCP:LISTEN | grep -q node"
    port: 3100
    depends_on: []

  websocket:
    start: APTOS_NETWORK=testnet node api/dist/ws.js &
    stop: lsof -ti :3101 | xargs kill 2>/dev/null || true
    healthcheck: "lsof -iTCP:3101 -sTCP:LISTEN | grep -q node"
    port: 3101
    depends_on: [api]

  web:
    start: cd web && PORT=3102 npx next start -p 3102 &
    stop: lsof -ti :3102 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3102
    port: 3102
    depends_on: []
